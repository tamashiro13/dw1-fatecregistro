<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Aluno - DSM</title>
  </head>
  <body>
    <header>
      <h1>Cadastro de Aluno - DSM</h1>
      <p>Este formulário é designado para o Cadastramento de Alunos de DSM</p>
    </header>
    <main>
      <section>
        <form action="#" method="POST">
          <fieldset>
            <legend>Dados Pessoais</legend>
            <label for="nome">Nome Completo:</label><br />
            <input
              type="text"
              name="nome"
              id="nome"
              placeholder="Insira o seu nome Completo"
              required
            />
            <br />
            <label for="email">E-mail:</label><br />
            <input
              type="email"
              name="email"
              id="email"
              placeholder="Insira seu e-mail"
              required
            />
            <br />
            <label for="nascimento">Data de Nascimento</label><br />
            <input type="date" name="nascimento" id="nascimento" />
            <br />
          </fieldset>
          <fieldset>
            <legend>Dados Acadêmicos</legend>
            <label for="curso">Curso</label><br />
            <select name="curso" id="curso">
              <option value="nenhum">Selecione um curso</option>
              <option value="dsm">DSM</option>
              <option value="ads">ADS</option>
              <option value="outro">Outro</option>
            </select>
            <br /><br />
            <label for="periodo">Período:</label><br />
            <input type="radio" name="periodo" id="manha" value="m" />
            <label for="manha">Manhã</label>
            <input type="radio" name="periodo" id="noite" value="n" />
            <label for="noite">Noite</label>
            <br /><br />
            <label for="observacoes">Observações:</label><br />
            <textarea
              name="observacoes"
              rows="4"
              cols="40"
              id="observacoes"
              placeholder="Escreva aqui suas observações sobre o cadastro"
            ></textarea>
            <br /><br />
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
          </fieldset>
        </form>
      </section>
    </main>
  </body>
</html>
