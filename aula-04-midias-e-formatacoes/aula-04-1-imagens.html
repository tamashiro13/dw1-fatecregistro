<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeria de Fotos</title>
  </head>
  <body>
    <header>
      <h1>Galeria de Fotos:</h1>
    </header>
    <main>
      <section>
        <!-- Importando imagem local -->
        <img
          src="midias/imagem.jpg"
          alt="Paisagem"
          width="300px"
          height="300px"
        />
        <br /><br /><br />
        <!-- Importando imagens externas -->
        <img src="https://picsum.photos/id/100/300/200" alt="Imagem 01" />
        <img src="https://picsum.photos/id/101/300/200" alt="Imagem 02" />
        <img src="https://picsum.photos/id/102/300/200" alt="Imagem 03" />
        <img src="https://picsum.photos/id/111/300/200" alt="Imagem 04" />
        <img src="https://picsum.photos/id/112/300/200" alt="Imagem 05" />
        <img src="https://picsum.photos/id/113/300/200" alt="Imagem 06" />
        <img src="https://picsum.photos/id/120/300/200" alt="Imagem 07" />
        <img src="https://picsum.photos/id/125/300/200" alt="Imagem 08" />
        <img src="https://picsum.photos/id/140/300/200" alt="Imagem 09" />
        <img src="https://picsum.photos/id/151/300/200" alt="Imagem 10" />
        <img src="https://picsum.photos/id/152/300/200" alt="Imagem 11" />
        <img src="https://picsum.photos/id/153/300/200" alt="Imagem 12" />
      </section>
      <br /><br /><br />
      <section>
        <!-- Imagem com legenda -->
        <figure>
          <img
            src="midias/grafico.png"
            alt="Gráfico de crescimento anual da empresa."
            width="300px"
          />
          <figcaption>
            Gráfico de crescimento da empresa no ano de 2025.
          </figcaption>
        </figure>
      </section>
    </main>
    <footer>
      <p><em>&copy; 2026 - FATEC REGISTRO - DSM</em></p>
    </footer>
  </body>
</html>
