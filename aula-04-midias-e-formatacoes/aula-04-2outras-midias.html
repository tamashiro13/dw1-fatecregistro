<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outras Mídias no HTML5</title>
  </head>
  <body>
    <header>
      <h1>Outras Mídias no HTML5</h1>
    </header>
    <main>
      <section>
        <h2>Áudio</h2>
        <audio controls src="midias/audio.mp3"></audio>
        <h2>Vídeo</h2>
        <video controls src="midias/video.mp4" type="video.mp4" width="400px">
          Vídeo não encontrado ou não suportado
        </video>

        <h2>Vídeo do YouTube (externo) - iframe</h2>
        <iframe
          src="https://www.youtube.com/embed/3g6WChxY14I"
          title="Exemplo de vídeo do YouTube"
          width="560px"
          height="315px"
          frameborder="0"
        >
        </iframe>
        <iframe
          width="560"
          height="315"
          src="https://www.youtube.com/embed/-YbiBclEEgo?si=mKQvyjWtbnK83u0C"
          title="YouTube video player"
          frameborder="0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share;
          "
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        >
        </iframe>

        <!-- Incorporando mapas -->
        <h2>Mapas (iframe)</h2>
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d116208.47769115606!2d-47.89210185725883!3d-24.467609269251117!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94c53436f4f0c1cb%3A0xbab60b5cc9451e73!2sRegistro%2C%20SP%2C%2011900-000!5e0!3m2!1spt-BR!2sbr!4v1773192546753!5m2!1spt-BR!2sbr"
          width="600"
          height="450"
          style="border: 0"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        >
        </iframe>

        <!-- Incorporando PDFs -->
        <h2>PDF (iframe)</h2>
        <iframe
          src="midias/documento.pdf"
          frameborder="0"
          title="Horários DSM-1"
          width="600px"
          height="450px"
        >
        </iframe>

        <!-- Incorporando vetores -->
        <h2>Vetores (ilustração)</h2>
        <svg
          width="50"
          height="50"
          viewBox="0 0 50 50"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M23.5656 12.3375C21.6661 10.429 19.0864 9.35294 16.3937 9.34591C13.701 9.33887 11.1157 10.4014 9.20625 12.3C7.30769 14.2095 6.24512 16.7948 6.25215 19.4875C6.25918 22.1801 7.33524 24.7598 9.24375 26.6594L23.9531 41.3719C24.2461 41.6648 24.6435 41.8294 25.0578 41.8294C25.4721 41.8294 25.8695 41.6648 26.1625 41.3719L40.7969 26.7469C42.6945 24.8375 43.7564 22.2529 43.7494 19.561C43.7424 16.8691 42.6669 14.29 40.7594 12.3906C39.8185 11.4428 38.6999 10.6899 37.4676 10.1749C36.2353 9.65999 34.9136 9.39313 33.5781 9.38965C32.2426 9.38617 30.9195 9.64612 29.6845 10.1546C28.4496 10.6631 27.3271 11.4102 26.3812 12.3531L24.9844 13.7531L23.5656 12.3375Z"
            fill="url(#paint0_linear_2_8)"
          />
          <defs>
            <linearGradient
              id="paint0_linear_2_8"
              x1="-1.95313"
              y1="0.0625013"
              x2="17.8187"
              y2="41.95"
              gradientUnits="userSpaceOnUse"
            >
              <stop stop-color="#F97DBD" />
              <stop offset="1" stop-color="#D7257D" />
            </linearGradient>
          </defs>
        </svg>
      </section>
    </main>
  </body>
</html>
