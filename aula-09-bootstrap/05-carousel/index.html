<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carousel com Bootstrap</title>
    <!-- Importação do Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="carousel slide" id="banner" data-bs-ride="carousel">
      <!-- Galeria de Imagens -->
      <div class="carousel-inner" id="imagens">
        <!-- Item Ativo do Carousel -->
        <div class="carousel-item active">
          <!-- 1º Imagem do Carousel -->
          <img
            src="https://picsum.photos/id/901/1110/500"
            class="w-100 d-block"
          />
          <!-- Inserindo texto na imagem do carousel -->
          <div class="carousel-caption">
            <h2>Lorem ipsum dolor, sit amet consectetur adipisicing elit.</h2>
          </div>
        </div>
        <!-- 2º Item do Carousel -->
        <div class="carousel-item">
          <img
            src="https://picsum.photos/id/910/1110/500"
            class="w-100 d-block"
          />
          <!-- Inserindo texto na imagem do carousel -->
        </div>
        <!-- 3º Item do Carousel -->
        <div class="carousel-item">
          <img
            src="https://picsum.photos/id/911/1110/500"
            class="w-100 d-block"
          />
          <!-- Inserindo texto na imagem do carousel -->
        </div>
      </div>
      <!-- BOTÕES INFERIORES DO CAROUSEL -->
      <div class="carousel-indicators" id="indicadores">
        <button
          type="button"
          data-bs-target="#banner"
          data-bs-slide-to="0"
          class="active"
        ></button>
        <button
          type="button"
          data-bs-target="#banner"
          data-bs-slide-to="1"
        ></button>
        <button
          type="button"
          data-bs-target="#banner"
          data-bs-slide-to="2"
        ></button>
      </div>
      <!-- BOTÕES DE NAVEGAÇÃO (ESQUERDA/DIREITA)-->
      <!-- ESQUERDO -->
      <button
        type="button"
        data-bs-target="#banner"
        data-bs-slide="prev"
        class="carousel-control-prev"
      >
        <span class="carousel-control-prev-icon"></span>
      </button>
      <!-- DIREITO -->
      <button
        type="button"
        data-bs-target="#banner"
        data-bs-slide="next"
        class="carousel-control-next"
      >
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
  </body>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
    integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
    crossorigin="anonymous"
  ></script>
</html>
