<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Introdução ao Bootstrap - Cores</title>
    <!-- Importação do Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <main>
      <section>
        <h1>Cores no Bootstrap</h1>
        <div>
          <p class="h3 text-muted">Classe text-muted</p>
          <p class="h3 text-primary">Classe text-primary</p>
          <p class="h3 text-success">Classe text-success</p>
          <p class="h3 text-info">Classe text-info</p>
          <p class="h3 text-warning">Classe text-warning</p>
          <p class="h3 text-danger">Classe text-danger</p>
          <p class="h3 text-secondary">Classe text-secondary</p>
        </div>
      </section>
      <hr />
      <section>
        <h1>Botões no Bootstrap</h1>
        <button type="button" class="btn">Normal</button>
        <br /><br />
        <button type="button" class="btn btn-primary">Primário</button>
        <br /><br />
        <button type="button" class="btn btn-secondary">Secondário</button>
        <br /><br />
        <button type="button" class="btn btn-success">Sucesso</button>
        <br /><br />
        <button type="button" class="btn btn-info">Informação</button>
        <br /><br />
        <button type="button" class="btn btn-warning">Alerta</button>
        <br /><br />
        <button type="button" class="btn btn-danger">Perigo</button>
        <br /><br />
        <button type="button" class="btn btn-dark">Dark</button>
        <br /><br />
        <button type="button" class="btn btn-light">Light</button>
        <br /><br />
        <button type="button" class="btn btn-link">Link</button>
        <br /><br />
        <button type="button" class="btn btn-outline-danger">
          Alerta Outline
        </button>
        <br /><br />
        <button type="button" class="btn btn-outline-primary">
          Primário Outline
        </button>
        <br /><br />
        <button type="button" class="btn btn-success btn-lg">Enviar</button>
        <br /><br />
        <button type="button" class="btn btn-success btn-sm">Enviar</button>
        <br /><br />
      </section>
    </main>
  </body>
  <!-- Importando o JavaScript do Bootstrap -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
    integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
    crossorigin="anonymous"
  ></script>

  <!-- Importamos scripts embaixo do body para melhorar o desempenho de carregamento da página -->
</html>
