<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sidebar</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <!-- Botão para acionar -->
    <div class="my-4 mx-4">
      <h3>Janela Lateral</h3>
      <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
      <button
        type="button"
        class="btn btn-secondary"
        data-bs-toggle="offcanvas"
        data-bs-target="#menu"
      >
        Abrir
      </button>
    </div>
    <!-- Janela lateral -->
    <!-- A janela pode surgir - do topo: "offcanvas-top" da direita: "offcanvas-end" da esquerda: "offcanvas-start"-->
    <div class="offcanvas offcanvas-end" id="menu">
      <div class="offcanvas-header">
        <h1 class="offcanvas-title">Menu de opções</h1>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
        ></button>
      </div>
      <div class="offcanvas-body">
        <a href="#" class="h4">Home</a><br />
        <a href="#" class="h4">Produtos</a><br />
        <a href="#" class="h4">Serviços</a><br />
        <a href="#" class="h4">Sobre nós</a><br />
      </div>
    </div>
  </body>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
    integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
    crossorigin="anonymous"
  ></script>
</html>
