<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbarf</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <!-- NAVBAR -->
    <!-- bg-dark / bg-light / navbar-dark / navbar-light -->
    <nav class="navbar bg-dark navbar-dark">
      <div class="container-fluid">
        <a href="#" class="navbar-brand">Meu logo</a>
        <!-- CAIXA DE PESQUISA -->
        <form action="" class="d-flex">
          <input type="text" class="form-control m-2" />
          <button type="button" class="btn btn-info m-2">Buscar</button>
        </form>
        <!-- BOTÃO DE MENU ESCONDIDO -->
        <button
          type="button"
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
          style="cursor: pointer"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <!-- MENU DE OPÇÕES -->
        <div class="navbar-collapse collapse" id="menu">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a href="#" class="h6" style="color: white">Home</a>
            </li>
            <li class="nav-item">
              <a href="#" class="h6" style="color: white">Produtos</a>
            </li>
            <li class="nav-item">
              <a href="#" class="h6" style="color: white">Sobre nós</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </body>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
    integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
    crossorigin="anonymous"
  ></script>
</html>
