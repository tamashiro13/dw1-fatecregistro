<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pseudo Classes no CSS</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Demonstração de Pseudo-Classes</h1>
    <h2>:hover - É ativada quando o mouse passa sobre o elemento;</h2>
    <div class="caixa">Passe o mouse aqui</div>
    <br />
    <h2>:active - Clique no botão</h2>
    <button class="btn_download">Download</button>
    <br />
    <h2>:focus - Clique nos campos</h2>
    <form>
      <input type="text" placeholder="Clique aqui para focar" />
      <input type="password" placeholder="Outro campo com focus" />
    </form>
  </body>
</html>
