<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Flexbox - Direção e Alinhamentos</title>
  </head>
  <body>
    <h2>Flexbox - Direção e Alinhamentos</h2>
    <p>Linha ao centro:</p>
    <div class="flex-container row-center">
      <div class="card">A</div>
      <div class="card">B</div>
      <div class="card">C</div>
    </div>
    <p>Coluna à esquerda:</p>
    <div class="flex-container column-left">
      <div class="card">A</div>
      <div class="card">B</div>
      <div class="card">C</div>
    </div>
    <p>Linha espaçada (space-between):</p>
    <div class="flex-container spaced">
      <div class="card">A</div>
      <div class="card">B</div>
      <div class="card">C</div>
    </div>
    <p>Quebra de linha (wrap):</p>
    <div class="flex-container wrap">
      <div class="card">A</div>
      <div class="card">B</div>
      <div class="card">C</div>
      <div class="card">D</div>
      <div class="card">E</div>
      <div class="card">F</div>
      <div class="card">G</div>
      <div class="card">H</div>
      <div class="card">I</div>
      <div class="card">J</div>
      <div class="card">K</div>
      <div class="card">L</div>
    </div>
  </body>
</html>
