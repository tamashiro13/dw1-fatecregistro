<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exemplo de site com HTML5 semântico</title>
  </head>

  <body>
    <!-- Cabeçalho do site -->
     <header>
      <h1>Portal de notícias</h1>
    </header>

    <!-- Menu de navegação -->
    <nav>
      <a href="#"><p>home</p></a>
      <a href="#"><p>Tecnologia</p></a>
      <a href="#"><p>Esportes</p></a>
      <a href="#"><p>Fazer login</p></a>
    </nav>

    <!-- linha divisória -->
    <hr />

    <!-- A parte central ou principal do site -->
    <main>
        <!-- Cria uma seção do site -->
        <section>
            <h2>Últimas notícias</h2>
            <article>
                <h3>HTML 5 ganha destaque</h3>
                <p>O HTML 5 trouxe melhorias significativas para a web.</p>
            </article>

            <article>
                <h3>CSS e Javascript</h3>
                <p>Tecnologias que trabalham em conjunto com o HTML.</p>
            </article>
        </section>
        <hr>

        <!-- Conteúdo secondário do site -->
        <aside>
            <h3>Anúncios</h3>
            <!-- strong deixa o texto em negrito -->
            <p><strong>Espaço publicitário</strong></p>
        </aside>

    </main>
    <hr>
    
    <footer><em>&copy;</em></footer>

  </body>
</html>
